global:
  # 相同 alert 在 resolve 前最少等待时间
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

receivers:
  - name: default
    webhook_configs:
      - url: "http://localhost:9093/placeholder"
        send_resolved: true
        # 生产环境替换为实际 webhook URL（如 Slack incoming webhook 或企业微信机器人）

# 预留 Slack 接收器模板（取消注释并填写 webhook_url 即可启用）
