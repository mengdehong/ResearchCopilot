server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # container name → label "container"
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # compose service name → label "service"
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # 只收集有 rc- 前缀的容器（Research Copilot 自身容器）
      - source_labels: [container]
        regex: rc-.*
        action: keep
    pipeline_stages:
      # structlog 输出为 JSON，直接解析
      - json:
          expressions:
            level: level
            event: event
            logger: logger
            timestamp: timestamp
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
