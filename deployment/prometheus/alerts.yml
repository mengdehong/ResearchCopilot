groups:
  - name: api
    rules:
      - alert: HighErrorRate
        expr: >
          sum(rate(http_requests_total{status=~"5.."}[2m]))
          /
          sum(rate(http_requests_total[2m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx 错误率过高"
          description: "过去 2 分钟 5xx 错误率 {{ $value | humanizePercentage }}，超过阈值 5%。"

      - alert: HighP95Latency
        expr: >
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P95 延迟超过 2s"
          description: "过去 5 分钟 P95 延迟为 {{ $value }}s，超过阈值 2s。"

  - name: llm
    rules:
      - alert: HighQuotaExceededRate
        expr: sum(rate(llm_requests_total{status="quota_exceeded"}[5m])) > 0.16
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM Quota 超限频发"
          description: "过去 5 分钟 quota_exceeded 速率 {{ $value | humanize }}/s，超过阈值（10/min）。"

      - alert: LLMTokenBurnRateHigh
        expr: >
          sum(rate(llm_tokens_total[10m])) * 60 > 50000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LLM Token 消耗速率异常"
          description: "当前 token 消耗速率 {{ $value | humanize }}/min，超过 50,000/min 阈值。"

  - name: celery
    rules:
      - alert: CeleryWorkerDown
        expr: up{job="celery"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Celery Worker 不可用"
          description: "Celery Worker 已离线超过 1 分钟。"
