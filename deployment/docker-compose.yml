services:
  # ---- Infrastructure ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rc-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # ---- Backend API ----
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      target: api
    container_name: rc-backend
    env_file: ../.env.production.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---- Celery Worker ----
  celery-worker:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      target: worker
    container_name: rc-celery-worker
    env_file: ../.env.production.example
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ---- Frontend ----
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rc-frontend
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: rc-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
